name: Wöchentliche Pakete

# Erzeugt jeden Samstag früh frische Gerichte/Übungen und committet sie.
# Die App ändert sich erst, wenn Andriy/Anna die Lade-Knöpfe tippen.
on:
  schedule:
    - cron: '0 5 * * 6'   # Samstag 05:00 UTC = 07:00 Wien
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Favoriten aus Firestore holen (falls eingerichtet)
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: |
          if [ -n "$FIREBASE_SA" ]; then
            printf '%s' "$FIREBASE_SA" > sa.json
            pip install --quiet firebase-admin
            python packs/fetch_likes.py sa.json || echo "Favoriten-Abruf uebersprungen."
            rm -f sa.json
          else
            echo "Kein FIREBASE_SA-Secret -> nur Rotation (ohne Favoriten)."
          fi
      - name: Pakete neu erzeugen
        run: python packs/generate.py
      - name: Committen, falls geändert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packs/rezepte.json packs/wochenplan.json packs/training.json
          if git diff --cached --quiet; then
            echo "Keine Änderung – nichts zu committen."
          else
            git commit -m "packs: wöchentliche Erneuerung (KW $(date +%V))"
            git push
          fi
